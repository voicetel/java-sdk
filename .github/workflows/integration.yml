name: integration

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC — within the 6/hr/IP budget
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Integration tests (live, read-only)
        env:
          VOICETEL_USERNAME: ${{ secrets.VOICETEL_USERNAME }}
          VOICETEL_PASSWORD: ${{ secrets.VOICETEL_PASSWORD }}
        run: mvn -B -DskipTests=false -Dtest=IntegrationTest test
