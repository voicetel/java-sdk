name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build + test + coverage
        run: mvn -B verify
      - name: Coverage summary
        if: matrix.java == '21'
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            grep -oP 'Total[^%]+\d+%' target/site/jacoco/index.html | head -3 || true
          fi

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build jar + sources + javadoc
        run: mvn -B -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: target/*.jar
